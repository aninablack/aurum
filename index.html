CONCEPT
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Aurum is a financial intelligence dashboard. The aesthetic is "private bank
  meets modern data product" — Bloomberg's precision, a private wealth manager's
  restraint. It must feel expensive without a single gradient or drop shadow.

  The user is not a trader. They are an intelligent observer of markets.
  Every design decision should serve legibility and signal over noise.

TYPOGRAPHY — DM SERIF DISPLAY + DM SANS (Google Fonts)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Google Fonts import (place in <head>):
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display:ital@0;1&display=swap');

  --font-display: 'DM Serif Display', Georgia, serif;   /* prices & data values ONLY */
  --font-ui:      'DM Sans', system-ui, sans-serif;     /* everything else */

  RULE: DM Serif Display appears ONLY on primary data values (prices, index levels,
  percentages, rates). Never on labels, body copy, nav, buttons, or metadata.
  This contrast is the single most important typographic decision in Aurum.

  Scale:
  --text-data-hero:   font: 500 38px/1 var(--font-display);   /* hero strip values */
  --text-data-panel:  font: 400 26px/1 var(--font-display);   /* panel primary values */
  --text-data-small:  font: 400 18px/1 var(--font-display);   /* secondary values */
  --text-label:       font: 500 10px/1 var(--font-ui); letter-spacing: 0.08em; text-transform: uppercase;
  --text-body:        font: 400 13px/1.6 var(--font-ui);
  --text-meta:        font: 400 11px/1.5 var(--font-ui);
  --text-nav:         font: 500 12px/1 var(--font-ui); letter-spacing: 0.02em;

  Weights used: 300 (rare, large decorative), 400 (body), 500 (labels, nav, deltas).
  Never use 600 or 700 — too heavy against the refined palette.

COLOUR SYSTEM
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  :root {
    /* Page & surface */
    --color-page:          #F9F6F0;   /* warm off-white — never pure white for page bg */
    --color-surface:       #FFFFFF;   /* card surfaces lift from page */
    --color-surface-tint:  #F4F1EA;   /* subtle tint for alternating rows, hover states */
    --color-header:        #0D1B2A;   /* dark navy — top nav / dashboard header */

    /* Navy text scale (replaces black entirely) */
    --color-text-primary:   #0D1B2A;  /* deep navy — headings, primary values */
    --color-text-secondary: #4A5568;  /* blue-grey — body copy, descriptions */
    --color-text-tertiary:  #8A96A4;  /* muted — metadata, timestamps, placeholders */
    --color-text-disabled:  #C8D0D8;  /* light grey-blue */

    /* Gold accent scale — use sparingly */
    --gold-100:  #F0DFA0;   /* very light tint, hover backgrounds */
    --gold-400:  #D4AF37;   /* primary gold — wordmark, hero accents */
    --gold-500:  #C9A84C;   /* border gold — card borders, dividers */
    --gold-600:  #B8952A;   /* active gold — selected tabs, active states */
    --gold-800:  #8B6914;   /* text on gold-tinted backgrounds */

    /* Signal colours */
    --color-up:      #0F6E56;   /* positive delta — deep teal-green */
    --color-down:    #A32D2D;   /* negative delta — deep red */
    --color-caution: #B8952A;   /* warning / elevated risk — gold-amber */
    --color-neutral: #243D56;   /* informational — mid navy */

    /* Borders */
    --border-gold:   0.5px solid rgba(201, 168, 76, 0.35);   /* standard card border */
    --border-gold-strong: 0.5px solid rgba(201, 168, 76, 0.6); /* hover / focus */
    --border-nav:    1px solid rgba(201, 168, 76, 0.2);       /* dividers in header */
    --border-panel:  0.5px solid rgba(201, 168, 76, 0.25);    /* inner panel dividers */
  }

  GOLD USAGE RULES:
  ✓ Data category labels (10px uppercase)        e.g. "GOLD · XAU/USD"
  ✓ Card borders (rgba, never solid opaque)
  ✓ Active tab underline (2px solid #D4AF37)
  ✓ Intelligence dot indicator (6px circle)
  ✓ Wordmark in nav (on dark navy background)
  ✓ Top border accent on hero strip cards (2px solid #D4AF37)
  ✗ Never as a fill on large areas
  ✗ Never as button background
  ✗ Never on text larger than 14px (except wordmark)

LAYOUT & SPACING
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-7: 48px;

  --radius-sm:   6px;    /* inner elements: badges, tags, mini chips */

  NAV / HEADER
  ─────────────
  background: var(--color-header)    /* #0D1B2A dark navy */
  height: 52px
  padding: 0 24px
  border-bottom: var(--border-nav)
  Wordmark: font-family var(--font-display), 18px, color #D4AF37
  Tagline: DM Sans 10px, letter-spacing 0.1em, color rgba(212,175,55,0.5), uppercase
  Timestamp: DM Sans 10px, color rgba(212,175,55,0.4), right-aligned
  Nav links: DM Sans 12px 500, color rgba(255,255,255,0.6), hover: rgba(212,175,55,0.8)
  Active nav link: border-bottom: 2px solid #D4AF37, color #D4AF37

  DATA LABEL (appears above every value)
  ─────────────────────────────────────
  font: 500 10px DM Sans
  letter-spacing: 0.08em
  text-transform: uppercase
  color: #C9A84C  (gold-500)
  margin-bottom: 4px
  Example: "COMMODITY · GOLD" / "INDEX · S&P 500" / "FX · EUR/USD"

  ASSET CARD (standard panel)
  ────────────────────────────
  background: #FFFFFF
  border: var(--border-gold)
  border-radius: var(--radius-md)
  border-top: 2px solid #D4AF37   ← hero cards only, omit on secondary cards
  padding: 16px
  No box-shadow — elevation only from border colour difference vs page bg

  Structure inside each card:
  1. Data label     — 10px gold uppercase
  2. Primary value  — DM Serif Display 26px, color var(--color-text-primary)
  3. Delta line     — DM Sans 12px 500, color var(--color-up) or var(--color-down)
  4. Impact bar     — 3px height, border-radius 2px, colour matches delta direction
  5. Timestamp      — DM Sans 10px, color var(--color-text-tertiary)

  DELTA VALUES
  ─────────────
  Positive: color: #0F6E56; font-weight: 500
  Negative: color: #A32D2D; font-weight: 500
  Caution:  color: #B8952A; font-weight: 500
  Prefix:   show "+" for positive, "−" (minus, not hyphen) for negative
  Format:   always show % and absolute value  e.g. "+1.8%  +$41.20"

  INTELLIGENCE STRIP (bottom of hero area / each panel)
  ──────────────────────────────────────────────────────
  A single sentence of market context.
  Layout: 6px gold circle dot + 11px DM Sans text, color var(--color-text-secondary)
  padding: 10px 16px
  border-top: var(--border-panel)
  background: transparent
  One sentence only. Never bullet points inside the strip.

  SCENARIO BUTTONS
  ─────────────────
  DM Sans 12px 500
  padding: 7px 16px
  border-radius: var(--radius-pill)
  border: 0.5px solid var(--color-text-disabled)
  background: transparent
  color: var(--color-text-tertiary)
  Inactive hover: background var(--color-surface-tint)
  Active — Geopolitical: background #FCEBEB, border #A32D2D, color #791F1F
  Active — Rate hike:    background #FAEEDA, border #854F0B, color #633806
  Active — Supply shock: background #E1F5EE, border #0F6E56, color #085041
  Active — Crash:        background #EEEDFE, border #534AB7, color #3C3489

  FEAR & GREED GAUGE
  ───────────────────
  Display as arc / semicircle — not a bar
  0–24: Extreme fear (#A32D2D)
  25–44: Fear (#B8952A)
  45–55: Neutral (#8A96A4)
  56–74: Greed (#0F6E56)
  75–100: Extreme greed (#085041)
  Value: DM Serif Display 38px, centred under arc
  Label: DM Sans 12px 500, colour matches zone

  MACRO SIGNAL ROW (yield curve, CPI, Fed rate)
  ───────────────────────────────────────────────
  Horizontal strip, 4 metrics side by side
  Each: label (gold) above, value (DM Serif Display 20px) below, small delta beneath
  Dividers between: 0.5px vertical line, rgba(201,168,76,0.2)
  Inverted yield curve (T10Y2Y < 0): highlight entire cell with caution amber tint

MOTION & INTERACTION
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  Philosophy: motion confirms state changes, never decorates.

  Page load: staggered fade-in per row (animation-delay: 0, 80ms, 160ms, 240ms)
             opacity: 0 → 1, translateY: 6px → 0, duration: 400ms ease-out

  Value update: when data refreshes, updated values flash gold briefly
                transition: color 0.15s — flash to #D4AF37 then back to navy

  Card hover: border-color transitions from var(--border-gold) to var(--border-gold-strong)
              transition: border-color 0.2s ease

  Scenario activation: card tint fades in via opacity transition 0.35s
  
  Skeleton loader: @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
                   background: rgba(201,168,76,0.08), animation: pulse 1.6s infinite

  NO parallax, NO scroll animations, NO entrance animations on repeat visits.
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }

  CHART DESIGN RULES (read before configuring any chart)
  ───────────────────────────────────────────────────────
  · Canvas cannot resolve CSS variables — always use hardcoded hex values in Chart.js config
  · Disable the default Chart.js legend always: plugins: { legend: { display: false } }
  · Wrap every <canvas> in a <div style="position:relative;width:100%;height:Xpx">

  ────────────────────────────────────────────────────────────────────────────────
  CHART 3 — FEAR & GREED GAUGE (semicircular arc, hero panel)
  ────────────────────────────────────────────────────────────────────────────────

  Purpose: single daily sentiment reading rendered as a semicircle gauge.
           More spatially informative than a bar. Immediately scannable.
  Implementation: Canvas 2D API (not Chart.js — Chart.js doughnut clips poorly)
  Container: 280px wide, 160px tall, centred

  Arc zones (left to right, 0–100):
    0–24:  '#A32D2D'  Extreme fear
    25–44: '#B8952A'  Fear
    45–55: '#8A96A4'  Neutral
    56–75: '#0F6E56'  Greed
    76–100:'#085041'  Extreme greed

  Track arc (full 180° background): rgba(201,168,76,0.1), lineWidth 14
  Zone arcs: lineWidth 14, lineCap 'butt'
  Needle: line from centre to arc at value angle, '#0D1B2A', lineWidth 2, lineCap 'round'
  Centre dot: filled circle r=5, '#0D1B2A'
  Tick labels: '0', '25', '50', '75', '100' — DM Sans 10px, '#8A96A4', placed outside arc

  Value display: DM Serif Display 36px '#0D1B2A', centred below arc
  Classification: DM Sans 13px 500, colour matches active zone, below value

  Draw function:
  ─────────────
  function drawGauge(canvas, value) {
    const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2, cy = canvas.height - 20, r = 100;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Background track
    ctx.beginPath();
    ctx.arc(cx, cy, r, Math.PI, 2 * Math.PI);
    ctx.strokeStyle = 'rgba(201,168,76,0.1)';
    ctx.lineWidth = 14; ctx.stroke();

    // Colour zones
    const zones = [[0,25,'#A32D2D'],[25,45,'#B8952A'],[45,55,'#8A96A4'],[55,75,'#0F6E56'],[75,100,'#085041']];
    zones.forEach(([s, e, col]) => {
      ctx.beginPath();
      ctx.arc(cx, cy, r, Math.PI * (1 + s/100), Math.PI * (1 + e/100));
      ctx.strokeStyle = col; ctx.lineWidth = 14; ctx.lineCap = 'butt'; ctx.stroke();
    });

    // Needle
    const angle = Math.PI * (1 + value / 100);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * (r - 18), cy + Math.sin(angle) * (r - 18));
    ctx.strokeStyle = '#0D1B2A'; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.stroke();

    // Centre dot
    ctx.beginPath(); ctx.arc(cx, cy, 5, 0, 2 * Math.PI);
    ctx.fillStyle = '#0D1B2A'; ctx.fill();
  }

  Data source: data.fearGreed.value (integer 0–100)
  Update: call drawGauge(canvas, newValue) on data refresh — no destroy needed

  CHART 6 — WORLD CHOROPLETH MAP (geopolitical risk, D3 + TopoJSON)
  ────────────────────────────────────────────────────────────────────────────────

  Purpose: shade countries by GDELT conflict event density — 7-day rolling window.
           Turns the geopolitical feed into a spatial intelligence layer.
  Topology: https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json
  Projection: d3.geoNaturalEarth1()
  SVG viewBox: "0 0 {containerWidth} {containerWidth * 0.52}"
  width: "100%"

  Risk colour scale (5 bands, by event count 0–100 normalised):
    0–19:   rgba(13,27,42,0.06)   — near-invisible, stable
    20–39:  rgba(13,27,42,0.15)   — light navy tint
    40–59:  rgba(184,149,42,0.35) — amber — elevated
    60–79:  rgba(163,45,45,0.5)   — red-tinted — high risk
    80–100: '#A32D2D'              — deep red — active conflict

  Country borders: stroke rgba(249,246,240,0.6), strokeWidth 0.4
  No country labels on the map — hover tooltip only (country name + risk level)

  ISO numeric → ISO alpha-3 mapping required. Key countries to map:
    USA, RUS, CHN, IRN, ISR, UKR, GBR, DEU, FRA, IND, BRA,
    SAU, SYR, YEM, SDN, MMR, ETH, COD, PAK, AFG, NGA, MOZ

  Colour legend (rendered in HTML below the map, not on the SVG):
    [Low ░░▒▒▓▓██ High] — 5 swatches 16×8px with labels

  Data source: data.geopolitical.riskByCountry — object keyed by ISO alpha-3
    { "IRN": 90, "UKR": 99, "GBR": 10, ... }
  GDELT event counts are normalised to 0–100 by Claude's fetch.js pipeline.
  Update: full SVG redraw on data refresh (destroy SVG, recreate).

  Implementation pattern:
  ──────────────────────
  async function drawWorldMap(containerId, riskData) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    const w = container.offsetWidth, h = Math.round(w * 0.52);
    const svg = d3.select(container).append('svg')
      .attr('viewBox', `0 0 ${w} ${h}`).attr('width', '100%');
    const proj = d3.geoNaturalEarth1().scale(w / 6.2).translate([w / 2, h / 2]);
    const path = d3.geoPath(proj);
    const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    svg.selectAll('path')
      .data(topojson.feature(world, world.objects.countries).features)
      .join('path')
      .attr('d', path)
      .attr('fill', d => riskColour(riskData[isoNumericToAlpha3(d.id)] ?? 0))
      .attr('stroke', 'rgba(249,246,240,0.6)')
      .attr('stroke-width', 0.4);
  }

  ────────────────────────────────────────────────────────────────────────────────
  CHART DATA FLOW — HOW HISTORY GETS INTO THE JSON
  ────────────────────────────────────────────────────────────────────────────────

  The fetch.js pipeline (written by Claude, run by GitHub Actions) appends
  today's values to rolling history arrays stored in the Gist JSON.
  It reads the existing Gist, pushes new values, trims to 90 entries, writes back.

  Extended JSON shape with history arrays:
  {
    ...existing fields...,
    "history": {
      "gold":       [2201, 2215, 2198, ...],   // 90 daily closes, oldest first
      "silver":     [26.1, 26.4, 26.2, ...],
      "sp500":      [5102, 5118, 5098, ...],
      "dax":        [18050, 18120, 18090, ...],
      "ftse":       [7720, 7740, 7735, ...],
      "nikkei":     [38100, 38300, 38250, ...],
      "eurusd":     [1.078, 1.081, 1.079, ...],
      "treasury10y":[4.18, 4.22, 4.25, ...],
      "bitcoin":    [68200, 70100, 71400, ...]
    },
    "geopolitical": {
      "riskByCountry": { "IRN": 90, "UKR": 99, "GBR": 10, ... },
      "updatedAt": "2026-03-29T06:00:00Z"
    }
  }

  Sparklines read: data.history[key].slice(-30)
  Area chart reads: data.history.gold.slice(-N) where N = 7, 30, or 90
  Scatter reads: data.history.gold.slice(-90) paired with data.history.treasury10y.slice(-90)
  World map reads: data.geopolitical.riskByCountry

WHAT MAKES AURUM FEEL PREMIUM — THE 6 RULES
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  1. No drop shadows. Ever. Elevation comes from border colour contrast only.
  2. Gold touches exactly three things: labels, borders, active states.
     Touch more than three things and it reads tacky.
  3. DM Serif Display on values only. If it's not a number, it's DM Sans.
  4. Warm off-white page (#F9F6F0). Pure white reads clinical. Warm reads expensive.
  5. Navy text (#0D1B2A) not black. The blue undertones harmonise with gold.
  6. Generous whitespace inside panels. Fewer numbers shown with confidence
     reads smarter than many numbers shown with anxiety.

      background: var(--color-page);
      color: var(--color-text-primary);
      font-family: var(--font-ui);
      font-weight: 400;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── UTILITY ───────────────────────────────────────────────────── */
    .data-value {
      font-family: var(--font-display);
      font-variant-numeric: tabular-nums;
      color: var(--color-text-primary);
    }
    .data-label {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gold-500);
      margin-bottom: var(--space-1);
    }
    .delta-up   { color: var(--color-up);      font-weight: 500; }
    .delta-down { color: var(--color-down);    font-weight: 500; }
    .delta-caut { color: var(--color-caution); font-weight: 500; }

    /* ── NAV ───────────────────────────────────────────────────────── */
    .aurum-nav {
      background: var(--color-header);
      height: 52px;
      padding: 0 var(--space-5);
      border-bottom: var(--border-nav);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .aurum-wordmark {
      font-family: var(--font-display);
      font-size: 18px;
      color: var(--gold-400);
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .aurum-tagline {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(212,175,55,0.45);
      margin-top: 2px;
    }
    .nav-timestamp {
      font-size: 10px;
      color: rgba(212,175,55,0.4);
      letter-spacing: 0.04em;
    }

    /* ── LAYOUT ────────────────────────────────────────────────────── */
    .aurum-page {
      max-width: 1280px;
      margin: 0 auto;
      padding: var(--space-5) var(--space-5) var(--space-7);
    }

    /* ── CARDS ─────────────────────────────────────────────────────── */
    .card {
      background: var(--color-surface);
      border: var(--border-gold);
      border-radius: var(--radius-md);
      padding: var(--space-4);
      transition: border-color 0.2s ease;
    }
    .card:hover { border: var(--border-gold-strong); }
    .card-hero  { border-top: 2px solid var(--gold-400); }

    /* ── SKELETON LOADERS ──────────────────────────────────────────── */
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.8; }
    }
    .skeleton {
      background: rgba(201,168,76,0.08);
      border-radius: var(--radius-sm);
      animation: pulse 1.6s ease-in-out infinite;
    }

    /* ── PAGE LOAD ANIMATION ───────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }
    .row-1 { animation: fadeUp 400ms ease-out both; }
    .row-2 { animation: fadeUp 400ms ease-out 80ms both; }
    .row-3 { animation: fadeUp 400ms ease-out 160ms both; }
    .row-4 { animation: fadeUp 400ms ease-out 240ms both; }
    .row-5 { animation: fadeUp 400ms ease-out 320ms both; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    /* ── INTELLIGENCE STRIP ────────────────────────────────────────── */
    .intel-strip {
      display: flex;
      align-items: flex-start;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      border-top: var(--border-panel);
    }
    .intel-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold-500);
      flex-shrink: 0;
      margin-top: 4px;
    }
    .intel-text {
      font-size: 11px;
      color: var(--color-text-secondary);
      line-height: 1.5;
    }

    /* ── IMPACT BAR ────────────────────────────────────────────────── */
    .impact-track {
      height: 3px;
      background: rgba(201,168,76,0.15);
      border-radius: 2px;
      margin-top: var(--space-2);
      overflow: hidden;
    }
    .impact-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* ── SCENARIO BUTTONS ──────────────────────────────────────────── */
    .scenario-btn {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: var(--radius-pill);
      border: 0.5px solid var(--color-text-disabled);
      background: transparent;
      color: var(--color-text-tertiary);
      cursor: pointer;
      transition: all 0.2s;
    }
    .scenario-btn:hover { background: var(--color-surface-tint); }
    .scenario-btn.active-war    { background: #FCEBEB; border-color: #A32D2D; color: #791F1F; }
    .scenario-btn.active-rates  { background: #FAEEDA; border-color: #854F0B; color: #633806; }
    .scenario-btn.active-supply { background: #E1F5EE; border-color: #0F6E56; color: #085041; }
    .scenario-btn.active-crash  { background: #EEEDFE; border-color: #534AB7; color: #3C3489; }
    .row { margin-bottom: var(--space-4); }
    .row-1 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); }
    .row-2 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-4); }
    .row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-4); }
    .row-4 { display: grid; grid-template-columns: 2fr 1fr; gap: var(--space-4); }
    .row-5 { display: flex; gap: var(--space-2); flex-wrap: wrap; }
    .metric-value { font-size: 26px; line-height: 1; margin-bottom: var(--space-2); }
    .metric-sub { font-size: 12px; color: var(--color-text-secondary); font-variant-numeric: tabular-nums; }
    .metric-grid { display: grid; gap: var(--space-3); }
    .mini-row { display: flex; justify-content: space-between; align-items: baseline; border-bottom: var(--border-panel); padding-bottom: var(--space-2); }
    .mini-row:last-child { border-bottom: 0; padding-bottom: 0; }
    .news-list { margin-top: var(--space-3); display: grid; gap: var(--space-2); }
    .news-item { font-size: 12px; color: var(--color-text-secondary); border: var(--border-panel); border-radius: var(--radius-sm); padding: var(--space-2); background: var(--color-surface-tint); }
    .risk-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-2); margin-top: var(--space-3); }
    .risk-chip { border: var(--border-panel); border-radius: var(--radius-sm); font-size: 11px; padding: 6px 8px; color: var(--color-text-secondary); text-align: center; background: var(--color-surface-tint); font-variant-numeric: tabular-nums; }
    .banner { border: 0.5px solid rgba(184,149,42,0.6); color: #633806; background: #FAEEDA; padding: var(--space-2) var(--space-3); border-radius: var(--radius-sm); font-size: 12px; margin-bottom: var(--space-3); }
    .spark-wrap { position: relative; width: 140px; height: 52px; }
    .gauge-wrap { display: flex; justify-content: center; align-items: center; margin-top: 4px; }
    .indices-chart-wrap { position: relative; width: 100%; height: 190px; margin-top: 12px; }
    @media (max-width: 1024px) {
      .row-1, .row-2, .row-3, .row-4 { grid-template-columns: 1fr; }
      .spark-wrap { width: 120px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="aurum-nav">
    <div>
      <div class="aurum-wordmark">Aurum</div>
      <div class="aurum-tagline">Market intelligence</div>
    </div>
    <div class="nav-timestamp" id="navTimestamp">Loading…</div>
  </nav>

  <main class="aurum-page">
    <div id="staleBanner"></div>
    <section class="row row-1" id="row1"></section>
    <section class="row row-2" id="row2"></section>
    <section class="row row-3" id="row3"></section>
    <section class="row row-4" id="row4"></section>
    <section class="row row-5 card" id="row5"></section>
  </main>

  <script>
    const GIST_URL = 'https://gist.githubusercontent.com/aninablack/d1685d358f752cad1b30f28f5412c918/raw/aurum-data.json';
    const fmt = {
      price: (n) => n != null ? '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : '—',
      index: (n) => n != null ? Number(n).toLocaleString('en-US', { maximumFractionDigits: 0 }) : '—',
      fx: (n) => n != null ? Number(n).toFixed(4) : '—',
      pct: (n) => n != null ? `${n >= 0 ? '+' : '−'}${Math.abs(Number(n)).toFixed(2)}%` : '—',
      rate: (n) => n != null ? Number(n).toFixed(2) + '%' : '—',
      int: (n) => n != null ? Math.round(Number(n)).toString() : '—',
    };
    const deltaClass = (v) => v > 0 ? 'delta-up' : v < 0 ? 'delta-down' : 'delta-caut';
    const charts = {};

    if (window.Chart) {
      Chart.defaults.font.family = "'DM Sans', system-ui, sans-serif";
      Chart.defaults.font.size = 11;
      Chart.defaults.color = '#8A96A4';
    }

    async function loadData() {
      try {
        const res = await fetch(GIST_URL, { cache: 'no-store' });
        const data = await res.json();
        renderDashboard(data);
      } catch (err) {
        showError();
      }
    }

    function renderDashboard(data) {
      const ts = new Date(data?.meta?.updated || Date.now());
      document.getElementById('navTimestamp').textContent =
        'Live · ' + ts.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', timeZone: 'UTC' }) + ' UTC';

      const ageHours = (Date.now() - ts) / 3600000;
      document.getElementById('staleBanner').innerHTML = ageHours > 4 ? '<div class="banner">Data may be delayed</div>' : '';
      renderHero(data);
      renderMacro(data?.macro || {});
      renderMain(data);
      renderIntel(data);
      renderScenarios();
    }

    function renderHero(data) {
      const fg = data?.fearGreed || {};
      const movers = [
        ['Gold', data?.metals?.gold?.change],
        ['S&P 500', data?.indices?.sp500?.change],
        ['Bitcoin', data?.crypto?.bitcoin?.change],
      ].filter(([,v]) => v != null).sort((a,b) => Math.abs(b[1]) - Math.abs(a[1]));
      const top = movers[0];
      document.getElementById('row1').innerHTML = `
        <div class="card card-hero">
          <div class="data-label">Sentiment · Fear & Greed</div>
          <div class="gauge-wrap"><canvas id="fearGreedGauge" width="280" height="160"></canvas></div>
          <div class="metric-sub ${deltaClass((fg.value ?? 50) - (fg.previousClose ?? fg.value ?? 50))}" style="text-align:center">
            ${fmt.int(fg.value)} · ${fg.classification || 'Neutral'} · Prev ${fmt.int(fg.previousClose)}
          </div>
        </div>
        <div class="card card-hero">
          <div class="data-label">Intelligence</div>
          <div class="data-value metric-value">${top ? top[0] : 'No top mover'}</div>
          <div class="${top ? deltaClass(top[1]) : 'metric-sub'}" style="font-size:12px">${top ? fmt.pct(top[1]) : '—'}</div>
          <div class="intel-strip" style="padding-left:0;padding-right:0;border-top:0">
            <span class="intel-dot"></span>
            <span class="intel-text">${data?.sentiment?.headline || 'Markets stable — no dominant signals today.'}</span>
          </div>
        </div>`;
      drawGauge(document.getElementById('fearGreedGauge'), Number(fg.value ?? 50));
    }

    function renderMacro(m) {
      const items = [
        ['10Y Yield', fmt.rate(m?.treasury10y?.value), fmt.pct(m?.treasury10y?.change)],
        ['Yield Spread', m?.yieldSpread?.value != null ? ((m.yieldSpread.value >= 0 ? '+' : '') + Number(m.yieldSpread.value).toFixed(2)) : '—', fmt.pct(m?.yieldSpread?.change)],
        ['CPI', m?.cpi?.yoyPct != null ? Number(m.cpi.yoyPct).toFixed(2) + '%' : '—', fmt.pct(m?.cpi?.change)],
        ['Fed Funds', fmt.rate(m?.fedFunds?.value), fmt.pct(m?.fedFunds?.change)],
      ];
      document.getElementById('row2').innerHTML = items.map(([l, v, d]) => `
        <div class="card">
          <div class="data-label">${l}</div>
          <div class="data-value metric-value">${v}</div>
          <div class="metric-sub ${(d || '').startsWith('+') ? 'delta-up' : (d || '').startsWith('−') ? 'delta-down' : ''}">${d}</div>
        </div>`).join('');
    }

    function assetRow(label, value, delta, sparkId = '') {
      const cls = (delta || '').startsWith('+') ? 'delta-up' : (delta || '').startsWith('−') ? 'delta-down' : 'delta-caut';
      return `<div class="mini-row"><div><div style="font-size:12px;color:var(--color-text-secondary)">${label}</div><div class="data-value" style="font-size:18px">${value}</div></div><div style="display:flex;align-items:center;gap:8px"><div class="${cls}" style="font-size:12px">${delta}</div>${sparkId ? `<div class="spark-wrap"><canvas id="${sparkId}"></canvas></div>` : ''}</div></div>`;
    }

    function renderMain(data) {
      const metals = data?.metals || {};
      const indices = data?.indices || {};
      const fx = data?.fx || {};
      const history = data?.history || {};
      document.getElementById('row3').innerHTML = `
        <div class="card"><div class="data-label">Metals</div><div class="metric-grid">
          ${assetRow('Gold', fmt.price(metals?.gold?.price), fmt.pct(metals?.gold?.change), 'spark-gold')}
          ${assetRow('Silver', fmt.price(metals?.silver?.price), fmt.pct(metals?.silver?.change), 'spark-silver')}
          ${assetRow('Platinum', fmt.price(metals?.platinum?.price), fmt.pct(metals?.platinum?.change), 'spark-platinum')}
        </div></div>
        <div class="card"><div class="data-label">Indices</div><div class="metric-grid">
          ${assetRow('S&P 500', fmt.index(indices?.sp500?.price), fmt.pct(indices?.sp500?.change), 'spark-sp500')}
          ${assetRow('DAX', fmt.index(indices?.dax?.price), fmt.pct(indices?.dax?.change), 'spark-dax')}
          ${assetRow('FTSE', fmt.index(indices?.ftse?.price), fmt.pct(indices?.ftse?.change), 'spark-ftse')}
          ${assetRow('Nikkei', fmt.index(indices?.nikkei?.price), fmt.pct(indices?.nikkei?.change), 'spark-nikkei')}
          <div class="indices-chart-wrap"><canvas id="indicesBarChart"></canvas></div>
        </div></div>
        <div class="card"><div class="data-label">FX</div><div class="metric-grid">
          ${assetRow('EUR/USD', fmt.fx(fx?.EURUSD?.rate), fmt.pct(fx?.EURUSD?.change), 'spark-eurusd')}
          ${assetRow('GBP/USD', fmt.fx(fx?.GBPUSD?.rate), fmt.pct(fx?.GBPUSD?.change), 'spark-gbpusd')}
          ${assetRow('USD/JPY', fmt.fx(fx?.USDJPY?.rate), fmt.pct(fx?.USDJPY?.change), 'spark-usdjpy')}
          ${assetRow('USD/CHF', fmt.fx(fx?.USDCHF?.rate), fmt.pct(fx?.USDCHF?.change))}
        </div></div>`;

      makeSparkline('spark-gold', history.gold || [], '#D4AF37');
      makeSparkline('spark-silver', history.silver || [], '#D4AF37');
      makeSparkline('spark-platinum', history.platinum || [], '#D4AF37');
      makeSparkline('spark-sp500', history.sp500 || [], pickTrend((history.sp500 || [])));
      makeSparkline('spark-dax', history.dax || [], pickTrend((history.dax || [])));
      makeSparkline('spark-ftse', history.ftse || [], pickTrend((history.ftse || [])));
      makeSparkline('spark-nikkei', history.nikkei || [], pickTrend((history.nikkei || [])));
      makeSparkline('spark-eurusd', history.eurusd || [], pickTrend((history.eurusd || [])));
      makeSparkline('spark-gbpusd', history.gbpusd || [], pickTrend((history.gbpusd || [])));
      makeSparkline('spark-usdjpy', history.usdjpy || [], pickTrend((history.usdjpy || [])));
      buildIndicesBar(indices);
    }

    function renderIntel(data) {
      const topRisk = Object.entries(data?.geopolitical?.riskByCountry || {}).sort((a,b)=>b[1]-a[1]).slice(0, 8);
      const news = data?.sentiment?.newsItems || [];
      const history = data?.history || {};
      document.getElementById('row4').innerHTML = `
        <div class="card">
          <div class="data-label">Geopolitical Risk</div>
          <div class="risk-grid">${topRisk.map(([k,v]) => `<div class="risk-chip">${k}: ${v}</div>`).join('') || '<div class="risk-chip">No risk data</div>'}</div>
          <div class="news-list">${news.slice(0,5).map(n => `<div class="news-item"><strong>${n.source || 'Source'}</strong> · ${n.text || ''}</div>`).join('') || '<div class="news-item">No headlines available</div>'}</div>
        </div>
        <div class="card">
          <div class="data-label">Crypto Signals</div>
          <div class="metric-grid">
            ${assetRow('Bitcoin', fmt.price(data?.crypto?.bitcoin?.price), fmt.pct(data?.crypto?.bitcoin?.change), 'spark-btc')}
            ${assetRow('Ethereum', fmt.price(data?.crypto?.ethereum?.price), fmt.pct(data?.crypto?.ethereum?.change), 'spark-eth')}
          </div>
        </div>`;
      makeSparkline('spark-btc', history.bitcoin || [], pickTrend((history.bitcoin || [])));
      makeSparkline('spark-eth', history.ethereum || [], pickTrend((history.ethereum || [])));
    }

    function renderScenarios() {
      const labels = ['No scenario', 'Geopolitical conflict', 'Rate hike', 'Supply chain shock', 'Market correction'];
      document.getElementById('row5').innerHTML = labels.map(l => `<button class="scenario-btn">${l}</button>`).join('');
    }

    function showError() {
      document.querySelector('main').innerHTML =
        '<p style="color:var(--color-text-tertiary);font-size:13px;padding:48px 0;text-align:center">Unable to load market data — <button onclick="loadData()" style="color:var(--gold-600);background:none;border:none;cursor:pointer;font-size:13px">retry</button></p>';
    }

    function pickTrend(arr) {
      if (!arr || arr.length < 2) return '#8A96A4';
      return arr[arr.length - 1] >= arr[0] ? '#0F6E56' : '#A32D2D';
    }

    function makeSparkline(canvasId, dataArray, lineColor) {
      const canvas = document.getElementById(canvasId);
      if (!canvas || !window.Chart) return;
      if (charts[canvasId]) charts[canvasId].destroy();
      const values = (dataArray || []).slice(-30);
      charts[canvasId] = new Chart(canvas, {
        type: 'line',
        data: { labels: values.map((_, i) => i), datasets: [{ data: values, borderColor: lineColor, borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: false }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { enabled: false } }, scales: { x: { display: false }, y: { display: false } }, animation: { duration: 300 } }
      });
    }

    function buildIndicesBar(indices) {
      const id = 'indicesBarChart';
      const canvas = document.getElementById(id);
      if (!canvas || !window.Chart) return;
      if (charts[id]) charts[id].destroy();
      const labels = ['S&P 500', 'DAX', 'FTSE', 'Nikkei'];
      const vals = [indices?.sp500?.change, indices?.dax?.change, indices?.ftse?.change, indices?.nikkei?.change].map(v => v ?? 0);
      charts[id] = new Chart(canvas, {
        type: 'bar',
        data: { labels, datasets: [{ data: vals, backgroundColor: vals.map(v => v >= 0 ? 'rgba(15,110,86,0.75)' : 'rgba(163,45,45,0.75)'), borderColor: vals.map(v => v >= 0 ? '#0F6E56' : '#A32D2D'), borderWidth: 0.5, borderRadius: 3 }] },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { x: { grid: { color: 'rgba(201,168,76,0.08)' }, ticks: { callback: (v) => (v >= 0 ? '+' : '') + v + '%' } }, y: { grid: { display: false } } }
        }
      });
    }

    function drawGauge(canvas, value) {
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const cx = canvas.width / 2, cy = canvas.height - 20, r = 100;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.beginPath();
      ctx.arc(cx, cy, r, Math.PI, 2 * Math.PI);
      ctx.strokeStyle = 'rgba(201,168,76,0.1)';
      ctx.lineWidth = 14; ctx.stroke();
      const zones = [[0,25,'#A32D2D'],[25,45,'#B8952A'],[45,55,'#8A96A4'],[55,75,'#0F6E56'],[75,100,'#085041']];
      zones.forEach(([s, e, col]) => { ctx.beginPath(); ctx.arc(cx, cy, r, Math.PI * (1 + s / 100), Math.PI * (1 + e / 100)); ctx.strokeStyle = col; ctx.lineWidth = 14; ctx.stroke(); });
      const angle = Math.PI * (1 + (Number(value) || 50) / 100);
      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(angle) * (r - 18), cy + Math.sin(angle) * (r - 18)); ctx.strokeStyle = '#0D1B2A'; ctx.lineWidth = 2; ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, cy, 5, 0, 2 * Math.PI); ctx.fillStyle = '#0D1B2A'; ctx.fill();
    }

    loadData();
    setInterval(loadData, 15 * 60 * 1000);
  </script>

</body>
</html>
