<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Aurum — Live Geopolitical Financial Dashboard</title>
  <desc id="desc">Real-time macro signals, geopolitical risk, and market positioning in one briefing.</desc>

  <!-- Background -->
  <rect width="1200" height="630" fill="#EDE5D6"/>

  <!-- Top nav bar -->
  <rect x="0" y="0" width="1200" height="80" fill="#EDE5D6"/>
  <rect x="0" y="79" width="1200" height="1" fill="#DDD3BC"/>

  <!-- Wordmark only — no icon -->
  <text x="40" y="60" font-family="'Cormorant Garamond', Georgia, serif" font-size="56" font-weight="600" letter-spacing="0.04em" fill="#0D1B2A">Aurum</text>

  <!-- Card -->
  <rect x="36" y="108" width="1128" height="486" rx="18" fill="#FFFFFF" stroke="#C9A84C" stroke-width="3"/>

  <!-- MARKET BRIEFING label -->
  <text x="72" y="168" font-family="'DM Sans', system-ui, sans-serif" font-size="15" letter-spacing="0.15em" font-weight="700" fill="#8B6914">MARKET BRIEFING</text>
  <!-- Live Geopolitical Financial Dashboard — subtitle under label -->
  <text x="72" y="198" font-family="'DM Sans', system-ui, sans-serif" font-size="20" font-weight="400" letter-spacing="0.01em" fill="#6B7280">Live Geopolitical Financial Dashboard</text>

  <!-- Main headline — large serif -->
  <text x="72" y="296" font-family="'DM Serif Display', Georgia, serif" font-size="56" font-weight="400" fill="#0D1B2A">Gold, rates, and geopolitical</text>
  <text x="72" y="362" font-family="'DM Serif Display', Georgia, serif" font-size="56" font-weight="400" fill="#0D1B2A">risk — in one live briefing.</text>

  <!-- Subtext -->
  <text x="72" y="416" font-family="'DM Sans', system-ui, sans-serif" font-size="24" font-weight="400" fill="#4A5568">Real-time macro signals, sentiment, and scenario analysis.</text>
  <text x="72" y="450" font-family="'DM Sans', system-ui, sans-serif" font-size="24" font-weight="400" fill="#4A5568">Built for investors who act on information.</text>

  <!-- Divider -->
  <rect x="72" y="484" width="1056" height="1" fill="#EDE5D6"/>

  <!-- Feature strip -->
  <text x="72" y="532" font-family="'DM Sans', system-ui, sans-serif" font-size="18" font-weight="700" letter-spacing="0.08em" fill="#8B6914">AURUM</text>
  <text x="188" y="532" font-family="'DM Sans', system-ui, sans-serif" font-size="18" fill="#6B7280">· Live briefing · Fear &amp; Greed · Yield curve · Geopolitical risk map</text>
</svg>
