<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Aurum Geopolitical Financial Dashboard</title>

  <!-- Background -->
  <rect width="1200" height="630" fill="#EDE5D6"/>

  <!-- Card: x=36, y=40, w=1128, h=550 -->
  <rect x="36" y="40" width="1128" height="550" rx="18"
        fill="#FFFFFF" stroke="#C9A84C" stroke-width="2.5"/>

  <!-- In-card ribbon -->
  <rect x="56" y="58" width="1088" height="88" rx="10" fill="#F5F1E8"/>
  <text x="84" y="124"
        font-family="'Cormorant Garamond', Georgia, serif"
        font-size="54" font-weight="600" letter-spacing="2" fill="#0D1B2A">Aurum</text>
  <rect x="56" y="146" width="1088" height="2" fill="#C9A84C"/>

  <!-- Descriptor -->
  <text x="84" y="198"
        font-family="'DM Sans', system-ui, sans-serif"
        font-size="16" font-weight="700" letter-spacing="1.8" fill="#8B6914">GEOPOLITICAL FINANCIAL DASHBOARD</text>

  <!-- Headline -->
  <text x="84" y="270"
        font-family="'DM Serif Display', Georgia, serif"
        font-size="62" font-weight="400" fill="#0D1B2A">Gold, rates &amp; geopolitical risk</text>
  <text x="84" y="344"
        font-family="'DM Serif Display', Georgia, serif"
        font-size="62" font-weight="400" fill="#0D1B2A">in one live briefing.</text>

  <!-- Body copy -->
  <text x="84" y="404"
        font-family="'DM Sans', system-ui, sans-serif"
        font-size="22" font-weight="400" fill="#4A5568">Real-time macro signals, sentiment, and scenario analysis.</text>
  <text x="84" y="438"
        font-family="'DM Sans', system-ui, sans-serif"
        font-size="22" font-weight="400" fill="#4A5568">Fear &amp; Greed • Yield curve • Risk map.</text>
</svg>
