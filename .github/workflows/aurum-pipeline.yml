name: Aurum data pipeline

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # 5 runs/day at fixed UTC times: 04:00, 08:00, 12:00, 16:00, 20:00
    # UK (BST): 05:00, 09:00, 13:00, 17:00, 21:00
    - cron: '0 4,8,12,16,20 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Run fetch pipeline
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          FRED_KEY:          ${{ secrets.FRED_KEY }}
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          FINNHUB_KEY:       ${{ secrets.FINNHUB_KEY }}
          MARKETAUX_KEY:     ${{ secrets.MARKETAUX_KEY }}
          NEWSDATA_KEY:      ${{ secrets.NEWSDATA_KEY }}
          GNEWS_KEY:         ${{ secrets.GNEWS_KEY }}
          MEDIASTACK_KEY:    ${{ secrets.MEDIASTACK_KEY }}
          METALS_DEV_KEY:    ${{ secrets.METALS_DEV_KEY }}
          COINGECKO_KEY:     ${{ secrets.COINGECKO_KEY }}
          GIST_ID:           ${{ secrets.GIST_ID }}
          GIST_TOKEN:        ${{ secrets.GIST_TOKEN }}
        run: node fetch.js

      - name: Trigger Netlify deploy (optional — only needed if SSG)
        if: success()
        run: |
          if [ -n "${{ secrets.NETLIFY_BUILD_HOOK }}" ]; then
            curl -s -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}"
          fi
